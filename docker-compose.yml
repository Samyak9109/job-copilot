# Job Copilot — full stack in three containers.
#   docker compose up --build
#   app: http://localhost:8080   api: proxied at http://localhost:8080/api
services:
  mongo:
    image: mongo:7
    volumes:
      - jobcopilot_mongo:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      # Runs keyless in local memory mode by default. Add keys to go live.
      PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-please_change_me_in_prod}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DB: ${MONGODB_DB:-jobcopilot}
      LLM_PROVIDER: ${LLM_PROVIDER:-offline}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct:free}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Relative /api -> nginx proxies to the backend service (no CORS).
        VITE_API_BASE_URL: /api
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  jobcopilot_mongo:
